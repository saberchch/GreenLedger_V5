{% macro sso_button(provider, icon_svg='') %}
{% if provider == 'google' %}
<div id="g_id_onload"
     data-client_id="{{ config['GOOGLE_CLIENT_ID'] }}"
     data-context="signin"
     data-ux_mode="redirect"
     data-login_uri="{{ url_for('auth.google_callback', _external=True) }}"
     data-itp_support="true">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-shape="rectangular"
     data-theme="outline"
     data-text="signin_with"
     data-size="large"
     data-logo_alignment="left"
     data-width="200">
</div>
{% elif provider == 'microsoft' %}
<button class="flex items-center justify-center gap-2 rounded-lg border border-[#dbe6e0] dark:border-gray-700 bg-white dark:bg-[#1a2e24] h-12 px-4 hover:bg-gray-50 dark:hover:bg-[#2a4538] transition-colors" type="button">
    <svg aria-hidden="true" class="h-5 w-5" fill="none" viewbox="0 0 23 23">
        <path d="M0 0h23v23H0z" fill="#f3f3f3"></path>
        <path d="M1 1h10v10H1z" fill="#f35325"></path>
        <path d="M12 1h10v10H12z" fill="#81bc06"></path>
        <path d="M1 12h10v10H1z" fill="#05a6f0"></path>
        <path d="M12 12h10v10H12z" fill="#ffba08"></path>
    </svg>
    <span class="text-sm font-semibold text-[#111814] dark:text-white">Microsoft</span>
</button>
{% endif %}
{% endmacro %}
