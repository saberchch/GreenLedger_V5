{% macro sso_button(provider, icon_svg='') %}
{% if provider == 'google' %}
<div class="relative w-full" id="google-signin-wrapper">
    <!-- Placeholder: This button is visible while Google SDK is loading, 
         OR if Google refuses to render (e.g. unauthorized IP origin) -->
    <button id="google-placeholder" type="button" 
            class="flex w-full items-center justify-center gap-2 rounded-lg border border-[#dbe6e0] dark:border-gray-700 bg-white dark:bg-[#1a2e24] h-[40px] px-4 hover:bg-gray-50 dark:hover:bg-[#2a4538] transition-colors">
        <svg aria-hidden="true" class="h-5 w-5" viewbox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
        </svg>
        <span class="text-sm font-semibold text-[#111814] dark:text-white">Sign in with Google</span>
    </button>

    <!-- The actual Google button container. 
         Google's SDK will render an iframe inside here that overlays the placeholder. -->
    <div id="g_id_signin_div" class="absolute inset-0 opacity-0 hover:opacity-100 transition-opacity"></div>
</div>

<script>
    window.onload = function () {
        if (typeof google !== 'undefined') {
            google.accounts.id.initialize({
                client_id: "{{ config['GOOGLE_CLIENT_ID'] }}",
                callback: function(response) {
                    // This is for redirect mode, but GSI can also use a callback.
                    // However, we set redirect mode in renderButton usually.
                },
                ux_mode: "redirect",
                login_uri: "{{ url_for('auth.google_callback', _external=True) }}"
            });

            google.accounts.id.renderButton(
                document.getElementById("g_id_signin_div"),
                { 
                    type: "standard",
                    shape: "rectangular",
                    theme: "outline",
                    text: "signin_with",
                    size: "large",
                    logo_alignment: "left",
                    width: document.getElementById("google-placeholder").offsetWidth
                }
            );

            // If the real button renders, we make the wrapper container show it correctly
            // Note: Google's iframe usually takes over.
            document.getElementById("g_id_signin_div").classList.remove('opacity-0');
        }
    };

    // Fallback click handler if Google fails to load/render
    document.getElementById("google-placeholder").onclick = function() {
        // Only trigger if Google SDK didn't overlay the button
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            alert("Google Sign-In is restricted on this network address (" + window.location.hostname + ").\n\nPlease use http://localhost:5000 or http://127.0.0.1:5000 to sign in.");
        }
    };
</script>
{% elif provider == 'microsoft' %}
<button class="flex items-center justify-center gap-2 rounded-lg border border-[#dbe6e0] dark:border-gray-700 bg-white dark:bg-[#1a2e24] h-12 px-4 hover:bg-gray-50 dark:hover:bg-[#2a4538] transition-colors" type="button">
    <svg aria-hidden="true" class="h-5 w-5" fill="none" viewbox="0 0 23 23">
        <path d="M0 0h23v23H0z" fill="#f3f3f3"></path>
        <path d="M1 1h10v10H1z" fill="#f35325"></path>
        <path d="M12 1h10v10H12z" fill="#81bc06"></path>
        <path d="M1 12h10v10H1z" fill="#05a6f0"></path>
        <path d="M12 12h10v10H12z" fill="#ffba08"></path>
    </svg>
    <span class="text-sm font-semibold text-[#111814] dark:text-white">Microsoft</span>
</button>
{% endif %}
{% endmacro %}
